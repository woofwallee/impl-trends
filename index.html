<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Implementation Health</title>
<style>
  :root{
    --bg:#f4f6f9; --panel:#ffffff; --ink:#111826; --muted:#5b6675; --line:#e4e8ef;
    --accent:#2f6ded; --bad:#dc2626; --warn:#c2761a; --good:#15803d; --ok:#6b7280; --mute:#9aa2af;
    --badbg:#fdecec; --warnbg:#fdf3e6; --goodbg:#e9f6ee; --okbg:#f1f3f6; --mutebg:#f1f3f6;
    --shadow:0 1px 2px rgba(17,24,38,.06),0 1px 8px rgba(17,24,38,.04);
  }
  :root[data-theme="dark"]{
    --bg:#0f141b; --panel:#161d27; --ink:#e8edf4; --muted:#9aa6b6; --line:#26303d;
    --accent:#5b8bff; --bad:#ff6b6b; --warn:#e0a24a; --good:#43c07a; --ok:#8b95a4; --mute:#6b7482;
    --badbg:#2a1a1c; --warnbg:#2a2214; --goodbg:#132420; --okbg:#1b232e; --mutebg:#1b232e;
    --shadow:0 1px 2px rgba(0,0,0,.3);
  }
  @media (prefers-color-scheme: dark){ :root:not([data-theme="light"]){
    --bg:#0f141b; --panel:#161d27; --ink:#e8edf4; --muted:#9aa6b6; --line:#26303d;
    --accent:#5b8bff; --bad:#ff6b6b; --warn:#e0a24a; --good:#43c07a; --ok:#8b95a4; --mute:#6b7482;
    --badbg:#2a1a1c; --warnbg:#2a2214; --goodbg:#132420; --okbg:#1b232e; --mutebg:#1b232e;
    --shadow:0 1px 2px rgba(0,0,0,.3);
  }}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  #app{max-width:1040px;margin:0 auto;padding:18px 20px 60px}
  #app.drag{outline:2px dashed var(--accent);outline-offset:-8px}
  h1{font-size:22px;margin:.2em 0}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:26px 0 10px;font-weight:600}
  .muted{color:var(--muted)}
  b{font-weight:650}
  /* top bar */
  .top{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;padding-bottom:6px}
  .brand b{font-size:18px}
  .tagline{display:block;font-size:12px;color:var(--muted)}
  .controls{display:flex;gap:8px;align-items:center}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);padding:8px 11px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:var(--panel);color:var(--muted);border:none;padding:7px 13px;font-size:13px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}
  /* exec band */
  .exec{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px 20px;margin-top:12px}
  .exec-date{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .exec-line{font-size:17px;margin:4px 0}
  .exec-line.muted{font-size:14px}
  .delta{color:var(--muted);font-weight:600}
  /* notices */
  .notices{margin-top:12px;display:flex;flex-direction:column;gap:6px}
  .notice{background:var(--warnbg);color:var(--warn);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px}
  /* focus */
  .frow{width:100%;display:grid;grid-template-columns:96px 1fr auto;grid-template-areas:"fx stage go" "fx det go";gap:2px 14px;align-items:center;text-align:left;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--bad);border-radius:12px;padding:12px 16px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);color:inherit;font:inherit}
  .frow:hover{border-color:var(--accent)}
  .fx{grid-area:fx;font-size:24px;font-weight:700;line-height:1;display:flex;flex-direction:column}
  .fx small{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .fstage{grid-area:stage;font-size:15px;font-weight:600}
  .fdet{grid-area:det;font-size:13px;color:var(--muted)}
  .fgo{grid-area:go;color:var(--accent);font-size:13px;font-weight:600;white-space:nowrap}
  .tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:999px;margin-left:6px}
  .tag.customer{background:var(--warnbg);color:var(--warn)}
  .tag.team{background:var(--okbg);color:var(--muted)}
  .actfirst,.filling{font-size:13px;margin-top:8px}
  /* table */
  .tscroll{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel);box-shadow:var(--shadow)}
  table{border-collapse:collapse;width:100%;font-size:13px}
  th,td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  tr:last-child td{border-bottom:none}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}
  .sev-bad{background:var(--badbg);color:var(--bad)} .sev-warn{background:var(--warnbg);color:var(--warn)}
  .sev-good{background:var(--goodbg);color:var(--good)} .sev-ok{background:var(--okbg);color:var(--ok)} .sev-mute{background:var(--mutebg);color:var(--mute)}
  /* drill */
  .drill{margin-top:14px;background:var(--panel);border:1px solid var(--accent);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  .drill-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .drill-head button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px}
  .drilltbl{margin-top:4px}
  /* empty */
  .empty{text-align:center;padding:80px 20px}
  .empty .btn{margin-top:14px}
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="app.js?v=33"></script>
</body>
</html>
