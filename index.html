<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Implementation Health</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232E6F7E'/%3E%3Cpath d='M18 56 h16 l8 -22 l11 44 l8 -22 h21' stroke='white' stroke-width='8' fill='none' stroke-linejoin='round' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  :root{
    --ground:#F5F7F9; --surface:#FFFFFF; --surface-2:#FAFBFC;
    --ink:#1B2230; --muted:#57616F; --faint:#8993A2; --hairline:#E4E9EE;
    --accent:#2E6F7E; --accent-soft:#e7f0f1;
    --aging:#C0392B; --aging-soft:#f8e7e4;
    --building:#B0761A; --building-soft:#f7eede;
    --clearing:#2E8B6E; --clearing-soft:#e3f1ea;
    --stable:#697585; --stable-soft:#edf0f3;
    --shadow:0 1px 2px rgba(20,30,45,.05),0 1px 8px rgba(20,30,45,.03);
    --serif:Georgia,"Times New Roman",serif;
  }
  @media (prefers-color-scheme: dark){ :root:not([data-theme="light"]){
    --ground:#0F1319; --surface:#171C24; --surface-2:#1B212A;
    --ink:#E7ECF3; --muted:#9AA4B3; --faint:#69737F; --hairline:#28303B;
    --accent:#5AA9BA; --accent-soft:#183036;
    --aging:#E27063; --aging-soft:#3a221f;
    --building:#D89C41; --building-soft:#352a17;
    --clearing:#54B695; --clearing-soft:#173025;
    --stable:#8B96A6; --stable-soft:#232a33;
    --shadow:0 1px 2px rgba(0,0,0,.3);
  }}
  :root[data-theme="dark"]{
    --ground:#0F1319; --surface:#171C24; --surface-2:#1B212A;
    --ink:#E7ECF3; --muted:#9AA4B3; --faint:#69737F; --hairline:#28303B;
    --accent:#5AA9BA; --accent-soft:#183036;
    --aging:#E27063; --aging-soft:#3a221f;
    --building:#D89C41; --building-soft:#352a17;
    --clearing:#54B695; --clearing-soft:#173025;
    --stable:#8B96A6; --stable-soft:#232a33;
    --shadow:0 1px 2px rgba(0,0,0,.3);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ground);color:var(--ink);
    font:15px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  #app{max-width:1000px;margin:0 auto;padding:20px 24px 72px}
  #app.drag{outline:2px dashed var(--accent);outline-offset:-8px}
  .muted{color:var(--muted)}
  b{font-weight:650}
  .tnum,.num{font-variant-numeric:tabular-nums}

  /* top bar */
  .top{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .brand b{font-size:17px}
  .tagline{display:block;font-size:12px;color:var(--faint)}
  .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--hairline);padding:8px 11px}
  .seg{display:inline-flex;border:1px solid var(--hairline);border-radius:8px;overflow:hidden}
  .seg button{background:var(--surface);color:var(--muted);border:none;padding:7px 13px;font-size:13px;cursor:pointer;white-space:nowrap}
  .seg button.on{background:var(--accent);color:#fff}

  /* pills (verdict language) */
  .pill{font-size:11px;font-weight:700;letter-spacing:.02em;padding:3px 9px;border-radius:20px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  .pill.aging{background:var(--aging-soft);color:var(--aging)}
  .pill.building{background:var(--building-soft);color:var(--building)}
  .pill.clearing{background:var(--clearing-soft);color:var(--clearing)}
  .pill.stable{background:var(--stable-soft);color:var(--stable)}

  /* ============ SNAPSHOT (leadership · editorial) ============ */
  .snaphead{margin:14px 0 10px}
  .kicker{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin:0 0 8px}
  .snaphead h1{font-family:var(--serif);font-weight:600;font-size:30px;line-height:1.15;margin:0 0 8px;letter-spacing:-.01em;text-wrap:balance}
  .snaphead .sub{color:var(--muted);font-size:14.5px;max-width:64ch;margin:0 0 16px}
  .periods{margin-top:4px}

  .snapcard{background:var(--surface);border:1px solid var(--hairline);border-radius:14px;padding:22px 24px;box-shadow:var(--shadow)}
  .sc-brand{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--hairline);padding-bottom:12px;margin-bottom:16px}
  .sc-brand b{font-size:15px}
  .sc-brand span{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em}
  .snapcard .lead{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--faint);margin:0 0 16px}
  .stmts{display:grid;grid-template-columns:1fr 1fr;gap:18px 30px}
  @media(max-width:600px){.stmts{grid-template-columns:1fr}}
  .stmt{display:flex;flex-direction:column;gap:3px}
  .stmt .q{font-size:12px;color:var(--faint)}
  .stmt .a{font-family:var(--serif);font-size:19px;line-height:1.3;color:var(--ink)}
  .stmt .a .n{font-weight:700}
  .stmt .a em{font-style:normal;font-size:13px;font-family:system-ui,sans-serif;color:var(--muted)}
  .a .up{color:var(--aging);font-family:system-ui,sans-serif;font-size:15px;font-weight:600}
  .a .dn{color:var(--clearing);font-family:system-ui,sans-serif;font-size:15px;font-weight:600}

  .snap-drags{margin-top:22px;border-top:1px solid var(--hairline);padding-top:16px}
  .sd-h{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:10px}
  .sd-row{display:grid;grid-template-columns:20px 1fr auto;gap:12px;align-items:center;padding:7px 0}
  .sd-rank{font-weight:700;color:var(--faint);font-variant-numeric:tabular-nums}
  .sd-name{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sd-x{font-variant-numeric:tabular-nums;font-weight:650;color:var(--aging);white-space:nowrap}
  .sd-x small{color:var(--faint);font-weight:500;font-size:11px}

  .snap-actions{display:flex;align-items:center;gap:10px;margin-top:16px}
  .snap-actions .muted{font-size:13px}

  /* ============ DASHBOARD (analysis) ============ */
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin:26px 0 12px;font-weight:600}
  .dashhead{display:flex;gap:16px;flex-wrap:wrap;align-items:baseline;background:var(--surface);border:1px solid var(--hairline);border-radius:12px;padding:14px 18px;box-shadow:var(--shadow);margin-top:14px;font-size:14px}
  .dashhead .exec-date{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em}
  .delta{color:var(--muted);font-weight:600}
  .notices{margin-top:12px;display:flex;flex-direction:column;gap:6px}
  .notice{background:var(--building-soft);color:var(--building);border:1px solid var(--hairline);border-radius:8px;padding:8px 12px;font-size:13px}

  .focus{margin-top:6px}
  .card.frow{width:100%;position:relative;display:grid;grid-template-columns:22px 1fr auto;gap:14px;align-items:center;text-align:left;
    background:var(--surface);border:1px solid var(--hairline);border-radius:10px;padding:14px 16px 14px 18px;margin-bottom:9px;
    cursor:pointer;box-shadow:var(--shadow);color:inherit;font:inherit;overflow:hidden}
  .card.frow::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--aging)}
  .card.frow:hover{border-color:var(--accent)}
  .rankn{font-variant-numeric:tabular-nums;font-weight:700;font-size:15px;color:var(--faint)}
  .cmain{min-width:0}
  .crow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .cname{font-weight:650;font-size:15px}
  .creason{color:var(--muted);font-size:13px;margin-top:3px}
  .creason b{color:var(--ink);font-weight:600}
  .clink{color:var(--accent);font-size:13px;font-weight:600;white-space:nowrap;border:1px solid var(--hairline);border-radius:7px;padding:5px 10px;background:var(--surface-2)}
  .restful{font-size:13px;color:var(--muted);padding:6px 2px 0}
  .restful b{color:var(--ink)}

  .tablewrap{overflow-x:auto;border:1px solid var(--hairline);border-radius:12px;background:var(--surface);box-shadow:var(--shadow)}
  table{border-collapse:collapse;width:100%;min-width:640px;font-size:13px}
  th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:11px 13px;border-bottom:1px solid var(--hairline);white-space:nowrap}
  td{padding:10px 13px;border-bottom:1px solid var(--hairline);white-space:nowrap}
  tr:last-child td{border-bottom:none}
  th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
  td.stg{font-weight:600}

  .drill{margin-top:14px;background:var(--surface);border:1px solid var(--accent);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
  .drillhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--hairline);background:var(--surface-2)}
  .drillhead .t{font-weight:650;font-size:14px}
  .drillhead .c{font-size:12.5px;color:var(--muted)}
  .drillhead button{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px}
  .rec{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--hairline);font-size:13.5px}
  .rec:last-child{border-bottom:none}
  .rec .who{font-weight:550;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rec .prod{font-size:11px;color:var(--muted);border:1px solid var(--hairline);border-radius:5px;padding:2px 7px}
  .rec .age{font-variant-numeric:tabular-nums;font-weight:650;color:var(--aging)}

  /* empty */
  .empty{text-align:center;padding:80px 20px}
  .empty h1{font-family:var(--serif);font-weight:600;font-size:26px;margin:0 0 8px}
  .empty .btn{margin-top:16px}
</style>
</head>
<body>
<div id="app"></div>
<script src="vendor/html2canvas.min.js"></script>
<script type="module" src="app.js?v=34"></script>
</body>
</html>
